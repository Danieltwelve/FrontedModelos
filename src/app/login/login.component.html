<div> 
 <div class="login-box">
    <h2>Iniciar Sesión</h2>
    <form (ngSubmit)="onSubmit()">
      <div class="textbox">
        <input type="text" placeholder="Usuario" [(ngModel)]="username" name="username" required>
      </div>
      <div class="textbox">
        <input type="password" placeholder="Contraseña" [(ngModel)]="password" name="password" required>
      </div>
      <div class="submit-button">
        <input type="submit" value="Iniciar sesión">
      </div>
      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>
    </form>
    <div class="links">
      <a routerLink="/register" class="register-link">Registrarse</a> | 
      <a href="#" class="forgot-password">¿Olvidó su contraseña?</a>
    </div>
  </div>
</div>
