<div class="devices-container">
  <h2 class="title">📡 Lista de Dispositivos</h2>

  <div class="table-container">
    <table class="devices-table">
      <thead>
        <tr>
          <th>🔧 Nombre</th>
          <th>📂 Tipo</th>
          <th>📍 Ubicación</th>
          <th>⚙️ Acción</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let device of devices">
          <td>{{ device.name }}</td>
          <td>{{ device.type }}</td>
          <td>{{ device.location }}</td>
          <td class="action-cell">
            <button
              *ngIf="device.status === 'INACTIVE'"
              class="btn btn-activate"
              (click)="activarDispositivo(device)">
              Activar
            </button>
            <button
              *ngIf="device.status !== 'INACTIVE'"
              class="btn btn-deactivate"
              (click)="desactivarDispositivo(device)">
              Desactivar
            </button>
            <!-- <span *ngIf="device.status !== 'INACTIVE'" class="status-label">Activa</span> -->
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Stream de video -->
<div class="video-box" *ngIf="showVideo">
  <img #videoImage [src]="videoUrl" alt="Video en vivo" class="video-stream" />
  <button (click)="openFullscreen(videoImage)" class="fullscreen-btn">
    ⛶ Pantalla completa
  </button>
</div>
